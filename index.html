<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="login">
            <span class="registerTitle">Create your character</span>
            <div class="registerName">
                <label class="textLabel">Character name</label>
                <input class="textInput" type="text" value>
            </div>
            <button class="registerButton">Create character</button>
        </div>

        <div id="home">
            <header class="header">
                <button>Home</button>
                <button class="CharacterPage">Character</button>
                <button class="SettingsPage">Settings</button>
            </header>
        
            <div class="buttonContainer">
                <div class="mainPageContainer">
                    <button class="buttonFight">Fight!</button>
                </div>
            </div>
        </div>

        <div id="fight">
            <header class="header">
                <button class="homeButton">Home</button>
                <button class="CharacterPageFight">Character</button>
                <button>Settings</button>
            </header>
        
            <div class="fightPanel">
        
                <div class="heroContainer">
                    <span class="heroName"></span>
                    <img src="img/character1.jpg" alt="hero" class="hero">
                    <div class="healthBar">
                        <progress class="heroHealth" value="100" max="100"></progress>
                        <span class="healtBarLabel">100</span>
                    </div>
        
                </div>
        
                <div class="buttleContainer">
                    <p>Please pick 1 Attack zone and 2 Defence zones</p>
                    <div class="attackButtons">
                        <div class="attack">
                            <p>Attack Zones</p>
                            <div class="radioButton">
                                <label for="">Head</label>
                                <input class="radio" type="radio" name="attack" value="Head">
                            </div>
                            <div class="radioButton">
                                <label for="">Neck</label>
                                <input class="radio" type="radio" name="attack" value="Neck">
                            </div>
                            <div class="radioButton">
                                <label for="">Body</label>
                                <input class="radio" type="radio" name="attack" value="Body">
                            </div>
                            <div class="radioButton">
                                <label for="">Belly</label>
                                <input class="radio" type="radio" name="attack" value="Belly">
                            </div>
                            <div class="radioButton">
                                <label for="">Legs</label>
                                <input class="radio" type="radio" name="attack" value="Legs">
                            </div>
                        </div>
        
                        <div class="defence">
                            <p>Defence Zones</p>
                            <div class="radioButton">
                                <input class="radio" type="checkbox" name="defence" value="Head">
                                <label for="">Head</label>
                            </div>
                            <div class="radioButton">
                                <input class="radio" type="checkbox" name="defence" value="Neck">
                                <label for="">Neck</label>
                            </div>
                            <div class="radioButton">
                                <input class="radio" type="checkbox" name="defence" value="Body">
                                <label for="">Body</label>
                            </div>
                            <div class="radioButton">
                                <input class="radio" type="checkbox" name="defence" value="Belly">
                                <label for="">Belly</label>
                            </div>
                            <div class="radioButton">
                                <input class="radio" type="checkbox" name="defence" value="Legs">
                                <label for="">Legs</label>
                            </div>
                        </div>
        
                    </div>
                    <button class="buttonAttack">Attack!</button>
                </div>
        
                <div class="enemyContainer">
                    <p class="enemyName">Enemy</p>
                    <img src="img/enemy1.jpg" alt="enemy" class="enemy">
                    <div class="healthBar">
                        <progress class="enemyHealth" value="100" max="100"></progress>
                        <span class="healtBarLabel">100</span>
                    </div>
                </div>
        
        
            </div>
            <p id='battleLog'></p>
        </div>

        <script src="main.js"></script>
</body>
</html>
