<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="login">
            <span class="registerTitle">Create your character</span>
            <div class="registerName">
                <label class="textLabel">Character name</label>
                <input class="textInput" type="text" value>
            </div>
            <button class="registerButton">Create character</button>
        </div>
        
        <div id="home">
            <header class="header">
                <button>Home</button>
                <button class="CharacterPage">Character</button>
                <button class="SettingsPage">Settings</button>
            </header>
        
            <div class="buttonContainer">
                <div class="mainPageContainer">
                    <button class="buttonFight">Fight!</button>
                </div>
            </div>
        </div>
        
        <div id="fight">
            <header class="header">
                <button class="homeButton">Home</button>
                <button class="CharacterPageFight">Character</button>
                <button>Settings</button>
            </header>
        
            <div class="fightPanel">
        
                <div class="heroContainer">
                    <span class="heroName"></span>
                    <img src="img/character1.jpg" alt="hero" class="hero">
                    <div class="healthBar">
                        <progress class="heroHealth" value="100" max="100"></progress>
                        <span class="healtBarLabel">100</span>
                    </div>
        
                </div>
        
                <div class="buttleContainer">
                    <p>Please pick 1 Attack zone and 2 Defence zones</p>
                    <div class="attackButtons">
                        <div class="attack">
                            <p>Attack Zones</p>
                            <div class="radioButton">
                                <label for="">Head</label>
                                <input class="radio" type="radio" name="attack" value="Head">
                            </div>
                            <div class="radioButton">
                                <label for="">Neck</label>
                                <input class="radio" type="radio" name="attack" value="Neck">
                            </div>
                            <div class="radioButton">
                                <label for="">Body</label>
                                <input class="radio" type="radio" name="attack" value="Body">
                            </div>
                            <div class="radioButton">
                                <label for="">Belly</label>
                                <input class="radio" type="radio" name="attack" value="Belly">
                            </div>
                            <div class="radioButton">
                                <label for="">Legs</label>
                                <input class="radio" type="radio" name="attack" value="Legs">
                            </div>
                        </div>
        
                        <div class="defence">
                            <p>Defence Zones</p>
                            <div class="radioButton">
                                <input class="radiodefense" type="radio" name="defense1" value="Head">
                                <label for="">Head</label>
                            </div>
                            <div class="radioButton">
                                <input class="radiodefense" type="radio" name="defense2" value="Neck">
                                <label for="">Neck</label>
                            </div>
                            <div class="radioButton">
                                <input class="radiodefense" type="radio" name="defense3" value="Body">
                                <label for="">Body</label>
                            </div>
                            <div class="radioButton">
                                <input class="radiodefense" type="radio" name="defense4" value="Belly">
                                <label for="">Belly</label>
                            </div>
                            <div class="radioButton">
                                <input class="radiodefense" type="radio" name="defense5" value="Legs">
                                <label for="">Legs</label>
                            </div>
                        </div>
        
                    </div>
                    <button class="buttonAttack">Attack!</button>
                </div>
        
                <div class="enemyContainer">
                    <span class="enemyName">Enemy</span>
                    <img src="img/enemy1.jpg" alt="enemy" class="enemy">
                    <div class="healthBar">
                        <progress class="enemyHealth" value="100" max="100"></progress>
                        <span class="healtBarLabel">100</span>
                    </div>
                </div>
        
        
            </div>
            <div class="log">
                <p id='battleLog'></p>
            </div>
        </div>
        
        <div id="character">
            <header class="header">
                <button class="characterHome">Home</button>
                <button>Character</button>
                <button>Settings</button>
            </header>
        
            <div class="characterInformation">
                <div class="characterInformation__Avatar">
                    <img src="img/character1.jpg" alt="character" class="characterInformation__Avatar--image">
                </div>
                <div class="characterInformation__Data">
                    <div class="characterInformation__Data--name"></div>
                    <div class="characterInformation__Data--Results">
                        <span class="characterInformation__Data--Results-Wins"></span>
                        <span class="characterInformation__Data--Results-Loses"></span>
                    </div>
                </div>
            </div>
        </div>
        
        <div id="settings">
            <header class="header">
                <button>Home</button>
                <button class="CharacterBtnChr">Character</button>
                <button>Settings</button>
            </header>
        
            <div class="SettingsContainer">
                <div class="ChangeNameContainer">
                    <input type="text" class="ChangeName" placeholder="Change Name" value>
                    <button class="saveNameBtn">Сохранить</button>
                    <span class="userNameDisplay"></span>
                </div>
            </div>
        </div>
    </div>
        
        <div id="popup">
            <div class="popup-content">
                <button class="closePopup">Close</button>
                <div class="image-options">
                    <img src="img/character1.jpg" alt="Character1" class="selectable">
                    <img src="img/character2.jpg" alt="Character2" class="selectable">
                    <img src="img/character3.jpg" alt="Character2" class="selectable">
                    <img src="img/character4.jpg" alt="Character2" class="selectable">
                </div>
            </div>
        </div>

        <script src="main.js"></script>
</body>
</html>
